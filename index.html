<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nazo</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <link rel="icon" href="/Asset/nazoWmForWeb.png" type="image/png">
    
    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body>
    <!-- Particles Background -->
    <div id="particles-js"></div>

    <!-- Hamburger Menu Button -->
    <button id="menu-toggle" class="menu-toggle" aria-label="Open Gallery Menu">
        <i class="fa-solid fa-bars"></i>
    </button>

    <!-- Sidebar / Drawer -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3 class="sidebar-title">Nazo</h3>
            <button id="close-sidebar" class="close-btn" aria-label="Close Menu">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div class="sidebar-content">
            <!-- Gallery Title -->
            <h4 id="gallery-title-sidebar" class="gallery-sidebar-title"></h4>
            <p id="gallery-subtitle-sidebar" class="gallery-sidebar-subtitle"></p>
            
            <!-- Horizontal Scroll Gallery (Pinterest Style) -->
            <div class="gallery-scroll-container">
                <div id="gallery-scroll" class="gallery-scroll">
                    <!-- Images will be injected here -->
                </div>
            </div>
            
            <!-- Extra Card (Top Up) in Sidebar -->
            <div id="extra-card-sidebar" class="extra-card-sidebar"></div>
        </div>
    </div>

    <!-- Overlay -->
    <div id="overlay" class="overlay"></div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Loading State -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>

        <!-- Content will be rendered here -->
        <div id="content" style="display: none;">
            <!-- Profile Section -->
            <div class="profile-section">
                <img id="profile-img" src="" alt="Profile" class="profile-img">
                <h1 id="profile-name" class="profile-name"></h1>
                <p id="profile-role" class="profile-role"></p>
                
                <!-- Social Header Icons -->
                <div id="social-header" class="social-header"></div>
            </div>

            <!-- Links Section -->
            <div id="links-section" class="links-section"></div>

            <!-- Footer -->
            <div id="footer" class="footer"></div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3801651333080366" crossorigin="anonymous"> </script>

    <!-- Main Script -->
    <script type="module" src="script.js"></script>
</body>
</html>
